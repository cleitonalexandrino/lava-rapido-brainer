<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Adm | LAVA RAPIDO BRAINER</title>
    <style>
        body {
            background-color: #050505;
            padding: 40px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }
        .admin-logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 0.1em;
            color: #fff;
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 60px;
        }
        .kpi-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 32px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .kpi-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #86868b;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }
        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
        }
        .kpi-comparison {
            margin-top: 16px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .growth-up { color: var(--accent); }
        .growth-down { color: #ff3b30; }

        .bookings-table-container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px;
        }
        .table-header {
            margin-bottom: 32px;
            font-size: 18px;
            font-weight: 600;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 16px;
            color: #86868b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        td {
            padding: 20px 16px;
            color: #f5f5f7;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
        }
        .status-badge {
            background: rgba(188, 255, 0, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
        }
        .btn-delete {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            border: 1px solid rgba(255, 59, 48, 0.2);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-delete:hover {
            background: rgba(255, 59, 48, 0.2);
            color: #ff453a;
        }
        .back-link {
            color: #86868b;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }
        .back-link:hover { color: #fff; }

        @media (max-width: 768px) {
            body {
                padding: 20px;
            }
            .admin-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
                margin-bottom: 30px;
            }
            .kpi-grid {
                grid-template-columns: 1fr;
                gap: 16px;
                margin-bottom: 30px;
            }
            .bookings-table-container {
                padding: 24px 20px;
                overflow-x: auto;
            }
            table {
                min-width: 600px; /* Garante que a tabela possa rolar horizontalmente se for maior que a tela */
            }
        }
    </style>
  <script type="module" crossorigin src="/assets/admin-B0mUXOIC.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/firebase-config-Bz55sDI6.js">
  <link rel="stylesheet" crossorigin href="/assets/firebase-config-CEOKlXgl.css">
</head>
<body>
    <header class="admin-header">
        <div class="admin-logo">LAVA RAPIDO BRAINER <span style="font-weight:300; opacity:0.5">/ COMMAND</span></div>
        <a href="index.html" class="back-link">&larr; Voltar para o site</a>
    </header>

    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-label">Hoje (Total Carros)</div>
            <div id="kpi-cars-today" class="kpi-value">0</div>
            <div id="kpi-cars-comp" class="kpi-comparison"></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">Faturamento Hoje</div>
            <div id="kpi-rev-today" class="kpi-value">R$ 0,00</div>
            <div id="kpi-rev-comp" class="kpi-comparison"></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">Evolução Mensal</div>
            <div id="kpi-growth" class="kpi-value">0%</div>
            <div class="kpi-comparison growth-up">Consistente</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">Média Ticket</div>
            <div id="kpi-avg" class="kpi-value">R$ 0,00</div>
        </div>
    </div>

    <div class="bookings-table-container">
        <div class="table-header">Agendamentos Recentes</div>
        <table id="admin-table">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Veículo</th>
                    <th>Cor</th>
                    <th>Pacote</th>
                    <th>Horário</th>
                    <th>Data</th>
                    <th>Status</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="admin-tbody">
                <!-- Rows injected by admin.js -->
            </tbody>
        </table>
    </div>

</body>
</html>
